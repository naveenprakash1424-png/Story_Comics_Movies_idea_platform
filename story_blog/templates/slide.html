{% if slides %}
<style>
    .carousel-img {
    width: 100%;
    height: 400px;        /* rectangle shape */
    object-fit: contain;  /* show full image (no cut) */
    background-color: #000; /* fills empty space cleanly */
    border-radius: 10px;
}
.carousel-img {
    width: 100%;
    height: 400px;
    object-fit: cover;   /* fills rectangle fully */
    border-radius: 10px;
}
</style>
<div id="storyCarousel" class="carousel slide carousel-fade mb-5 mx-auto shadow-sm rounded" 
     data-bs-ride="carousel" data-bs-interval="4000" data-bs-pause="false" style="max-width:900px;">

    <!-- Indicators -->
    <div class="carousel-indicators">
        {% for slide in slides %}
            <button type="button" data-bs-target="#storyCarousel" data-bs-slide-to="{{ forloop.counter0 }}"
            class="{% if forloop.first %}active{% endif %}" aria-current="true" aria-label="Slide {{ forloop.counter }}"></button>
        {% endfor %}
    </div>

    <!-- Slides -->
    <div class="carousel-inner rounded">
        {% for slide in slides %}
        <div class="carousel-item {% if forloop.first %}active{% endif %}">
            <img src="{{ slide.image.url }}" class="carousel-img">
                 <!-- style="height:350px; object-fit:cover;"> -->
            <div class="carousel-caption d-none d-md-block bg-dark bg-opacity-50 rounded p-2">
                <h5 class="fw-bold mb-1">{{ slide.title }}</h5>
                <p class="mb-0" style="font-size:0.9rem;">{{ slide.description|truncatewords:12 }}</p>
            </div>
        </div>
        {% endfor %}
    </div>

    <!-- Controls -->
    <button class="carousel-control-prev" type="button" data-bs-target="#storyCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon bg-dark rounded-circle p-2" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#storyCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon bg-dark rounded-circle p-2" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
    </button>
</div>

{% endif %}
